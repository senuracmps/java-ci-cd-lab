name: "Java Build Action"
description: "Compile and run Java program"
runs:
  using: "composite"

  steps:
    - name: Compile Java
      run: javac Main.java
      shell: bash

    - name: Run Java
      run: java Main
      shell: bash

    - name: Compile Java Program
      run: javac *.java
      shell: bash

    - name: Run Java Program
      run: java Main
      shell: bash

    - name: Run Test
      run: java CalculatorTest
      shell: bash